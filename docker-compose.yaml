services:
  aionui:
    build:
      context: .
      dockerfile: Dockerfile
    image: wuhao1477/aionui-server:latest
    container_name: aionui
    restart: unless-stopped
    init: true
    ports:
      - '${AIONUI_PORT:-40317}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      ALLOW_REMOTE: 'true'
      DATA_DIR: /data
    volumes:
      - ./docker-data:/data
      - ./workspace:/workspace
      - ./.codex:/root/.codex
