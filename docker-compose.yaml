services:
  aionui:
    build:
      context: .
      dockerfile: Dockerfile
    image: wuhao1477/aionui-server:latest
    container_name: aionui
    restart: unless-stopped
    init: true
    ports:
      - '${AIONUI_PORT:-40317}:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      ALLOW_REMOTE: 'true'
      DATA_DIR: /data
    volumes:
      - ./docker-data:/data
      # 将宿主机的项目或代码目录映射进容器内供 Agent 使用
      - ./workspace:/app/workspace
      - ./.codex:/root/.codex
